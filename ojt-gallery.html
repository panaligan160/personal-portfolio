    text-align:center;

}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

.gallery img{

    border-radius:10px;
}

    padding:12px;
    background:#38bdf8;
    color:black;
    text-decoration:none;
    border-radius:30px;
}

</style>

</head>
